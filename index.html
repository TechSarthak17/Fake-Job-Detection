<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeHire AI</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="heroScene" class="scene-shell">
<div class="container">

<div class="hero">
<p class="eyebrow">Cybersecurity Micro-Project</p>
<h1>SafeHire AI</h1>
<p class="subtitle">Analyze job offers for scam signals before you respond.</p>
</div>

<form id="jobForm">

<label>Company Name</label>
<input type="text" id="companyName" placeholder="Example: TCS" required>

<label>Company Website</label>
<input type="text" id="website" placeholder="Example: careers.tcs.com">

<label>HR Email</label>
<input type="email" id="email" placeholder="Example: recruiter@company.com" required>

<label>Job Description</label>
<textarea id="message" rows="6" placeholder="Paste the job message, offer text, or suspicious recruiter message"></textarea>

<button type="submit">Verify Job</button>

</form>

<section id="result" class="result-card result-empty" aria-live="polite">
<h2>Risk Assessment</h2>
<p>Enter the job details to generate a score, severity label, and explanation.</p>
</section>

</div>
</div>

<script src="vendor/three.r134.min.js"></script>
<script type="module" src="js/vanta-init.js"></script>
<script src="js/app.js"></script>

</body>
</html>
